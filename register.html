<!DOCTYPE html>
<html>
<head>
    <title>Student Hub - Join Us</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f7f4ef; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(185, 172, 153, 0.2); 
            width: 320px; 
            text-align: center;
            border: 2px solid #eaddcf;
        }
        h2 { color: #6d5947; margin-bottom: 5px; font-size: 26px; }
        .subtitle { color: #a39081; margin-bottom: 25px; font-size: 14px; }
        input { 
            width: 90%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 2px solid #ecdcd0; 
            border-radius: 12px; 
            background: #faf8f5;
            font-size: 14px;
            color: #6d5947;
            outline: none;
        }
        input:focus { border-color: #c0a995; }
        button { 
            width: 98%; 
            padding: 12px; 
            background: #ddbea9; /* Soft peach/warm pink-brown */
            color: #6b4f3a; 
            font-weight: bold;
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background: #bb9a84; transform: scale(1.02); }
        a { color: #a47e6c; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .error { color: #c97a7a; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌱 Set Up Your Desk</h2>
        <div class="subtitle">Let's create your cozy study account!</div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <p class="{{ category }}">{{ msg }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Choose a username" required><br>
            <input type="password" name="password" placeholder="Choose a password" required><br>
            <button type="submit">Create Account 🧸</button>
        </form>
        <p style="font-size: 14px; margin-top: 20px; color: #8e7d6f;">Already have a desk? <a href="/login">Log in</a></p>
    </div>
</body>
</html>
